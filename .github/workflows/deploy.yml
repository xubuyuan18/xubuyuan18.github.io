name: Build and Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [articles-updated]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync posts from blog repo
        if: github.event_name == 'repository_dispatch'
        run: |
          git clone https://github.com/xubuyuan18/blog.git /tmp/blog
          cp /tmp/blog/*.md source/_posts/
          rm -rf /tmp/blog
          git add source/_posts/
          git diff --cached --quiet && echo "No new posts" || git commit -m "sync: update posts from blog"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build hexo
        run: npx hexo generate

      - name: Commit and push public/
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/ -f
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "deploy: update static files"
          git push
